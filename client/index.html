<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" content="ICD-10 Medical Search Engine - Search medications, conditions, and ICD-10 codes with coverage status" />
    <meta name="keywords" content="ICD-10, medical codes, medications, drug search, healthcare, diagnosis codes, pharmaceutical reference, medical coding, saudi insurance, ksa drugs, saudi health insurance, saudi pharmacy" />
    <meta name="theme-color" content="#0284c7" />
    
    <!-- Open Graph Meta Tags for Social Media Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://icd10-search-engine.manus.space/" />
    <meta property="og:title" content="ICD-10 Medical Search Engine - Drug & Code Reference" />
    <meta property="og:description" content="Search ICD-10 medical codes, medications, and healthcare diagnosis codes. Find drug references and pharmaceutical information with Saudi insurance coverage status." />
    <meta property="og:image" content="https://icd10-search-engine.manus.space/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ICD-10 Medical Search Engine - Drug & Code Reference" />
    <meta name="twitter:description" content="Search ICD-10 medical codes, medications, and healthcare diagnosis codes. Find drug references and pharmaceutical information with Saudi insurance coverage status." />
    <meta name="twitter:image" content="https://icd10-search-engine.manus.space/og-image.png" />
    <meta name="twitter:creator" content="@icd10search" />
    
    <link rel="preconnect" href="/data" />
    <link rel="dns-prefetch" href="/data" />
    <link rel="canonical" href="https://icd10-search-engine.manus.space/" />
    
    <title>ICD-10 Medical Search Engine - Drug & Code Reference</title>
    
    <!-- Structured Data (JSON-LD) for Search Engines -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MedicalWebApplication",
      "name": "ICD-10 Medical Search Engine",
      "description": "Search ICD-10 medical codes, medications, and healthcare diagnosis codes with Saudi insurance coverage information",
      "url": "https://icd10-search-engine.manus.space/",
      "applicationCategory": "MedicalApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Person",
        "name": "Islam Mostafa Eid",
        "jobTitle": "Pharmacist"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://icd10-search-engine.manus.space/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "1250"
      }
    }
    </script>
    
    <!-- Google Fonts: Elegant Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Lora:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
