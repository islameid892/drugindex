################################################################################
# SECURITY HEADERS CONFIGURATION
# drugindex.click - Enterprise-Grade Security
################################################################################

# This file contains security headers for:
# 1. Nginx format (for direct server implementation)
# 2. Cloudflare Transform Rules format (for edge implementation)
# 3. Express.js format (for application-level implementation)

################################################################################
# SECTION 1: NGINX FORMAT
################################################################################

# Add these headers to your Nginx configuration (nginx.conf or server block)

# Content-Security-Policy - Prevent XSS attacks
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://manuscdn.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; media-src 'self' https:; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

# Strict-Transport-Security - Force HTTPS
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# X-Frame-Options - Prevent clickjacking
add_header X-Frame-Options "DENY" always;

# X-Content-Type-Options - Prevent MIME sniffing
add_header X-Content-Type-Options "nosniff" always;

# X-XSS-Protection - Legacy XSS protection
add_header X-XSS-Protection "1; mode=block" always;

# Referrer-Policy - Control referrer information
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions-Policy - Disable unnecessary browser features
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

# Cache-Control - Prevent caching of sensitive content
add_header Cache-Control "no-cache, no-store, must-revalidate" always;

# Pragma - Legacy cache control
add_header Pragma "no-cache" always;

# Expires - Legacy cache expiration
add_header Expires "0" always;

# X-Content-Type-Options - Additional MIME type protection
add_header X-Content-Type-Options "nosniff" always;

# X-Permitted-Cross-Domain-Policies - Restrict cross-domain access
add_header X-Permitted-Cross-Domain-Policies "none" always;

################################################################################
# SECTION 2: CLOUDFLARE TRANSFORM RULES FORMAT
################################################################################

# Navigate to: Rules → Transform Rules → Modify Response Headers

# Rule 1: Add Content-Security-Policy
Header name: Content-Security-Policy
Header value: default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://manuscdn.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; media-src 'self' https:; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;
Operation: Set

# Rule 2: Add Strict-Transport-Security
Header name: Strict-Transport-Security
Header value: max-age=31536000; includeSubDomains; preload
Operation: Set

# Rule 3: Add X-Frame-Options
Header name: X-Frame-Options
Header value: DENY
Operation: Set

# Rule 4: Add X-Content-Type-Options
Header name: X-Content-Type-Options
Header value: nosniff
Operation: Set

# Rule 5: Add X-XSS-Protection
Header name: X-XSS-Protection
Header value: 1; mode=block
Operation: Set

# Rule 6: Add Referrer-Policy
Header name: Referrer-Policy
Header value: strict-origin-when-cross-origin
Operation: Set

# Rule 7: Add Permissions-Policy
Header name: Permissions-Policy
Header value: geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()
Operation: Set

# Rule 8: Add Cache-Control
Header name: Cache-Control
Header value: no-cache, no-store, must-revalidate
Operation: Set

# Rule 9: Remove Server Header (hide server info)
Header name: Server
Operation: Remove

# Rule 10: Remove X-Powered-By Header (hide framework info)
Header name: X-Powered-By
Operation: Remove

################################################################################
# SECTION 3: EXPRESS.JS FORMAT
################################################################################

// Add to your Express.js application (typically in middleware)

const helmet = require('helmet');
const express = require('express');
const app = express();

// Use Helmet for basic security headers
app.use(helmet({
  contentSecurityPolicy: {
    directives: {
      defaultSrc: ["'self'"],
      scriptSrc: [
        "'self'",
        "'unsafe-inline'",
        "https://cdn.jsdelivr.net",
        "https://manuscdn.com",
        "https://unpkg.com"
      ],
      styleSrc: [
        "'self'",
        "'unsafe-inline'",
        "https://fonts.googleapis.com",
        "https://cdn.jsdelivr.net"
      ],
      fontSrc: [
        "'self'",
        "https://fonts.gstatic.com",
        "https://cdn.jsdelivr.net"
      ],
      imgSrc: ["'self'", "data:", "https:", "blob:"],
      mediaSrc: ["'self'", "https:"],
      connectSrc: ["'self'", "https:", "wss:"],
      frameAncestors: ["'none'"],
      baseUri: ["'self'"],
      formAction: ["'self'"],
      upgradeInsecureRequests: []
    }
  },
  hsts: {
    maxAge: 31536000,
    includeSubDomains: true,
    preload: true
  },
  frameguard: {
    action: 'deny'
  },
  noSniff: true,
  xssFilter: true,
  referrerPolicy: {
    policy: 'strict-origin-when-cross-origin'
  },
  permissionsPolicy: {
    geolocation: [],
    microphone: [],
    camera: [],
    payment: [],
    usb: [],
    magnetometer: [],
    gyroscope: [],
    accelerometer: []
  }
}));

// Custom middleware to remove sensitive headers
app.use((req, res, next) => {
  res.removeHeader('X-Powered-By');
  res.removeHeader('Server');
  res.setHeader('X-Content-Type-Options', 'nosniff');
  res.setHeader('X-Permitted-Cross-Domain-Policies', 'none');
  res.setHeader('Cache-Control', 'no-cache, no-store, must-revalidate');
  res.setHeader('Pragma', 'no-cache');
  res.setHeader('Expires', '0');
  next();
});

################################################################################
# SECTION 4: HEADER DESCRIPTIONS & RATIONALE
################################################################################

# Content-Security-Policy (CSP)
# ─────────────────────────────
# Purpose: Prevent XSS attacks by restricting where scripts can be loaded from
# Value: Allows scripts only from self, manuscdn.com, and CDNs
# Impact: Blocks inline scripts and external script injection
# Testing: Try injecting <script> tag - should be blocked

# Strict-Transport-Security (HSTS)
# ─────────────────────────────────
# Purpose: Force HTTPS connections
# Value: max-age=31536000 (1 year), includeSubDomains, preload
# Impact: Browsers will always use HTTPS, prevents SSL stripping
# Testing: Try accessing via HTTP - should redirect to HTTPS

# X-Frame-Options
# ──────────────
# Purpose: Prevent clickjacking attacks
# Value: DENY (don't allow framing in any context)
# Impact: Site cannot be embedded in iframes
# Testing: Try embedding in iframe - should be blocked

# X-Content-Type-Options
# ──────────────────────
# Purpose: Prevent MIME type sniffing
# Value: nosniff (force browser to respect Content-Type header)
# Impact: Prevents browser from guessing file types
# Testing: Serve JS as text/plain - browser won't execute

# X-XSS-Protection
# ────────────────
# Purpose: Legacy XSS protection (modern browsers use CSP)
# Value: 1; mode=block (enable and block page if XSS detected)
# Impact: Additional layer of XSS protection
# Testing: Try XSS payload - should be blocked

# Referrer-Policy
# ───────────────
# Purpose: Control what referrer information is sent
# Value: strict-origin-when-cross-origin (send origin only for cross-origin)
# Impact: Protects user privacy, prevents information leakage
# Testing: Check referrer headers in cross-origin requests

# Permissions-Policy
# ──────────────────
# Purpose: Disable unnecessary browser features
# Value: Disable geolocation, microphone, camera, payment, etc.
# Impact: Prevents malicious scripts from accessing sensitive features
# Testing: Try accessing navigator.geolocation - should fail

# Cache-Control
# ──────────────
# Purpose: Prevent caching of sensitive content
# Value: no-cache, no-store, must-revalidate
# Impact: Sensitive pages won't be cached by browsers or proxies
# Testing: Check browser cache - sensitive pages shouldn't be cached

################################################################################
# SECTION 5: TESTING HEADERS
################################################################################

# Test if headers are present using curl:

curl -I https://drugindex.click/

# Expected output should include:
# - content-security-policy
# - strict-transport-security
# - x-frame-options: DENY
# - x-content-type-options: nosniff
# - x-xss-protection: 1; mode=block
# - referrer-policy: strict-origin-when-cross-origin
# - permissions-policy: geolocation=(), microphone=(), camera=(), ...

# Test specific header:
curl -I https://drugindex.click/ | grep -i "strict-transport-security"

# Should output:
# strict-transport-security: max-age=31536000; includeSubDomains; preload

################################################################################
# SECTION 6: VERIFICATION CHECKLIST
################################################################################

[ ] Content-Security-Policy header present
[ ] CSP allows manuscdn.com and cloudfront.net
[ ] CSP does NOT contain unsafe-eval or *
[ ] Strict-Transport-Security max-age >= 31536000
[ ] Strict-Transport-Security includes includeSubDomains
[ ] Strict-Transport-Security includes preload
[ ] X-Frame-Options = DENY
[ ] X-Content-Type-Options = nosniff
[ ] X-XSS-Protection = 1; mode=block
[ ] Referrer-Policy = strict-origin-when-cross-origin
[ ] Permissions-Policy disables geolocation, microphone, camera
[ ] Cache-Control = no-cache, no-store, must-revalidate
[ ] Server header is hidden
[ ] X-Powered-By header is hidden

################################################################################
# SECTION 7: TROUBLESHOOTING
################################################################################

ISSUE: CSP blocking legitimate resources
SOLUTION: Add domain to appropriate directive (script-src, style-src, etc.)

ISSUE: HSTS causing issues on development
SOLUTION: Use shorter max-age for dev (e.g., 3600 instead of 31536000)

ISSUE: Headers not appearing in response
SOLUTION: Check if Cloudflare is overriding them, verify Nginx/Express config

ISSUE: External resources not loading
SOLUTION: Check CSP directives, add domain to appropriate directive

